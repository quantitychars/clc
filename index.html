<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Deploy</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #1d2b64;
      --bg3: #3a1c71;
      --accent: #7cf6ff;
      --text: #eef7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(125deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 300% 300%;
      animation: aurora 12s ease-in-out infinite alternate;
    }

    .bg-blobs {
      position: fixed;
      inset: -20vmax;
      pointer-events: none;
      filter: blur(40px);
      opacity: 0.45;
      background:
        radial-gradient(circle at 20% 20%, #4fd1ff 0 20%, transparent 40%),
        radial-gradient(circle at 80% 30%, #c084fc 0 22%, transparent 42%),
        radial-gradient(circle at 50% 85%, #34d399 0 18%, transparent 40%);
      animation: floatBlobs 18s ease-in-out infinite alternate;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(920px, 92vw);
      padding: 2.5rem 1.6rem;
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin: 0 0 0.8rem;
      font-size: clamp(1.7rem, 4.4vw, 3.6rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-shadow:
        0 0 12px rgba(124, 246, 255, 0.65),
        0 0 30px rgba(124, 246, 255, 0.35);
      animation: textWave 4s ease-in-out infinite, glide 7s ease-in-out infinite;
      will-change: transform;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      opacity: 0.9;
      animation: fadePulse 3s ease-in-out infinite;
    }

    .sparkle {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 10px #fff;
      animation: twinkle 2.8s infinite;
    }

    .sparkle:nth-child(1) { top: 16%; left: 14%; animation-delay: 0.1s; }
    .sparkle:nth-child(2) { top: 22%; right: 18%; animation-delay: 0.8s; }
    .sparkle:nth-child(3) { bottom: 20%; left: 20%; animation-delay: 1.4s; }
    .sparkle:nth-child(4) { bottom: 15%; right: 14%; animation-delay: 2.1s; }

    @keyframes aurora {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes floatBlobs {
      0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
      100% { transform: translate3d(2%, -2%, 0) rotate(12deg) scale(1.08); }
    }

    @keyframes textWave {
      0%, 100% { transform: translateY(0) skewX(0deg); }
      25% { transform: translateY(-8px) skewX(-1deg); }
      50% { transform: translateY(0) skewX(0deg); }
      75% { transform: translateY(8px) skewX(1deg); }
    }

    @keyframes glide {
      0%, 100% { transform: translateX(-1.5%) translateY(0); }
      50% { transform: translateX(1.5%) translateY(0); }
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.68; }
      50% { opacity: 1; }
    }

    @keyframes twinkle {
      0%, 100% { transform: scale(0.7); opacity: 0.25; }
      50% { transform: scale(1.35); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="bg-blobs"></div>

  <main class="card">
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <h1>Congratulations, we have deploy!</h1>
    <p>Congratulations, we have deploy!Congratulations, we have deploy!Congratulations, we have deploy!</p>
  </main>
</body>
</html>
